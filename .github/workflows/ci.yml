name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CuPyなしでインストール（CPU-only CI）
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check bankai/ --exit-zero

      - name: Run tests
        run: |
          pytest tests/ -v -m "not gpu and not slow" --tb=short

      - name: Check import
        run: |
          python -c "
          import bankai
          print(f'BANKAI v{bankai.__version__}')
          print(f'GPU: {bankai.GPU_AVAILABLE}')
          info = bankai.get_gpu_info()
          print(f'Info: {info}')
          "

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check bankai/ --output-format=github

      - name: Ruff format check
        run: ruff format --check bankai/ || true
